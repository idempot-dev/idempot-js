<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f8f8f8"/>
  
  <!-- Decorative curved element suggesting circular/repeat concept (idempotency) -->
  <g transform="translate(900, 150)">
    <!-- Outer arc - terracotta -->
    <path d="M 0 80 A 80 80 0 1 1 80 0" fill="none" stroke="#c7522a" stroke-width="12" stroke-linecap="round"/>
    <!-- Middle arc - teal -->
    <path d="M 20 80 A 60 60 0 1 1 80 20" fill="none" stroke="#008585" stroke-width="10" stroke-linecap="round"/>
    <!-- Inner arc - sage -->
    <path d="M 40 80 A 40 40 0 1 1 80 40" fill="none" stroke="#74a892" stroke-width="8" stroke-linecap="round"/>
    <!-- Checkmark - warm gold -->
    <path d="M 55 55 L 70 70 L 100 35" fill="none" stroke="#e5c185" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(80, 180)">
    <!-- Project name -->
    <text x="0" y="0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="96" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">
      idempot-js
    </text>
    
    <!-- Tagline -->
    <text x="0" y="80" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="400" fill="#4a4a4a" letter-spacing="-0.01em">
      Once is enough.
    </text>
  </g>
  
  <!-- Framework badges -->
  <g transform="translate(80, 420)">
    <!-- Express badge -->
    <rect x="0" y="0" width="140" height="44" rx="6" fill="#c7522a" fill-opacity="0.12"/>
    <text x="70" y="29" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c7522a" text-anchor="middle">Express</text>
    
    <!-- Fastify badge -->
    <rect x="160" y="0" width="140" height="44" rx="6" fill="#008585" fill-opacity="0.12"/>
    <text x="230" y="29" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#008585" text-anchor="middle">Fastify</text>
    
    <!-- Hono badge -->
    <rect x="320" y="0" width="140" height="44" rx="6" fill="#74a892" fill-opacity="0.12"/>
    <text x="390" y="29" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#74a892" text-anchor="middle">Hono</text>
  </g>
</svg>